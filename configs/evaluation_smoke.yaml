seed: 42

# Minimal evaluation config intended for `neurinspectre evaluate --smoke-test`.
# Uses bundled CIFAR-10 TorchScript model and allows torchvision to download CIFAR-10
# into `./data/cifar10` if not already present.

datasets:
  cifar10:
    path: ./data/cifar10
    split: test
    num_samples: 1000
    batch_size: 128
    num_workers: 0

models:
  cifar10: models/cifar10_resnet20_norm_ts.pt

defenses:
  - name: jpeg
    type: jpeg
    dataset: cifar10
    quality: 75

attacks:
  - pgd
  - neurinspectre

perturbation:
  epsilon: 0.03137254901960784  # 8/255
  norm: Linf

iterations: 100

# AE guardrails: enabled only when you want strict correctness checks.
validity_gates:
  enabled: false

baseline_validation:
  enabled: false

